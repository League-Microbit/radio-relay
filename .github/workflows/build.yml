name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Set up PXT
        run: |
          npx pxt target microbit
          npx pxt install

      - name: Lint pxt.json file list
        run: node scripts/lint-pxt-files.js

      - name: Build
        env:
          PXT_FORCE_LOCAL: "1"
          PXT_COMPILE_SWITCHES: csv---mbcodal
        run: npx pxt build

      - name: Verify hex output
        run: test -f built/binary.hex && echo "built/binary.hex exists ($(wc -c < built/binary.hex) bytes)"

      - name: Upload hex artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-relay-hex
          path: built/binary.hex

      - name: Update latest release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp built/binary.hex built/radio-relay.hex
          if gh release view latest > /dev/null 2>&1; then
            gh release upload latest built/radio-relay.hex --clobber
          else
            gh release create latest built/radio-relay.hex \
              --title "Latest Build" \
              --notes "Auto-built from the latest commit on main. Download \`radio-relay.hex\` and copy it to your micro:bit."
          fi
